<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - XS IBDP Auth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('home') }}">XS IBDP Auth</a>
            <div>
                {% if current_user.is_authenticated %}
                <span class="me-2">Hello, {{ current_user.username }}</span>
                <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('dashboard') }}">Dashboard</a>
                <a class="btn btn-sm btn-outline-danger ms-2" href="{{ url_for('logout') }}">Sign out</a>
                {% else %}
                <a class="btn btn-sm btn-outline-primary" href="{{ url_for('login') }}">Sign in</a>
                <a class="btn btn-sm btn-outline-success ms-2" href="{{ url_for('register') }}">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="p-4 bg-white rounded shadow-sm">
            <h1 class="h4">Login Authentication System in Flask</h1>
            <p class="mb-0">Created for the fulfillment of requirements for XS IBDP Computer Science HL</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
