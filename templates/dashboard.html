<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
  <nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('home') }}">XS IBDP Auth</a>
      <div>
        <span class="me-3">Signed in as {{ current_user.username }}</span>
        <a class="btn btn-sm btn-outline-danger" href="{{ url_for('logout') }}">Sign out</a>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title">Dashboard</h4>
        <p class="card-text">You are authenticated. This area could show user-specific content.</p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
